# Alineación: LEGAL-BUENO (Lawful-Good)
# El objetivo es la estabilidad y el flujo constante de oro.
experiment_name: "experimento_dnd_lg"

simulation_params:
  turnos: 1000000
  semilla: 777
  num_jugadores: 4

rules_configuration:
  set_cartas: "legal_bueno"
  dinero_inicial: 2000
  cobro_salida: 200

output_params:
  output_dir: "data/resultados"
  verbose_summary: true
